<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Dark background -->
  <rect width="64" height="64" rx="10" fill="#111111"/>

  <!-- 6-blade camera aperture, centered at 32,32 -->
  <!-- outer radius=22, inner radius=10                                      -->
  <!-- Each blade: outer arc from 0°→60° CW, inner arc from 40°→20° CCW    -->
  <!-- outer(0°)=(0,-22)  outer(60°)=(19.05,-11)                            -->
  <!-- inner(40°)=(6.43,-7.66)  inner(20°)=(3.42,-9.40)                    -->
  <g transform="translate(32,32)">
    <path d="M 0,-22 A 22,22 0 0,1 19.05,-11 L 6.43,-7.66 A 10,10 0 0,0 3.42,-9.40 Z"
          fill="white" transform="rotate(0)"/>
    <path d="M 0,-22 A 22,22 0 0,1 19.05,-11 L 6.43,-7.66 A 10,10 0 0,0 3.42,-9.40 Z"
          fill="white" transform="rotate(60)"/>
    <path d="M 0,-22 A 22,22 0 0,1 19.05,-11 L 6.43,-7.66 A 10,10 0 0,0 3.42,-9.40 Z"
          fill="white" transform="rotate(120)"/>
    <path d="M 0,-22 A 22,22 0 0,1 19.05,-11 L 6.43,-7.66 A 10,10 0 0,0 3.42,-9.40 Z"
          fill="white" transform="rotate(180)"/>
    <path d="M 0,-22 A 22,22 0 0,1 19.05,-11 L 6.43,-7.66 A 10,10 0 0,0 3.42,-9.40 Z"
          fill="white" transform="rotate(240)"/>
    <path d="M 0,-22 A 22,22 0 0,1 19.05,-11 L 6.43,-7.66 A 10,10 0 0,0 3.42,-9.40 Z"
          fill="white" transform="rotate(300)"/>

    <!-- Subtle outer lens ring -->
    <circle r="25" fill="none" stroke="white" stroke-width="1.5" opacity="0.2"/>
    <!-- Subtle inner aperture ring -->
    <circle r="10" fill="none" stroke="white" stroke-width="1" opacity="0.25"/>
  </g>
</svg>
